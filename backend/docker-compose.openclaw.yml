# Osmo — OpenClaw sidecar
#
# Run alongside the main backend stack:
#   docker compose -f docker-compose.yml -f docker-compose.openclaw.yml up -d
#
# Prerequisites:
#   - Set OPENCLAW_GATEWAY_TOKEN in your .env (generate one: openssl rand -hex 32)
#   - Set ANTHROPIC_API_KEY or OPENAI_API_KEY in your .env
#   - Set OPENCLAW_ENABLED=true in your .env to activate delegation
#
# The gateway listens on host port 18790 (internal: 18789) so it doesn't
# collide with any existing local OpenClaw instance on the default 18789 port.

services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: osmo-openclaw
    pull_policy: always
    ports:
      - "18790:18789"
    environment:
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - openclaw-workspace:/home/node/.openclaw/workspace
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  openclaw-workspace:
    name: osmo-openclaw-workspace
