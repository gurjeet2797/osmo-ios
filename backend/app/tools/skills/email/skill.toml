[skill]
name = "email"
display_name = "Email"
description = "search, read, list/read attachments (google_gmail.*)"
tool_modules = ["google_gmail"]
planner_instructions = [
    "Email chain: ALWAYS search_emails → read_email on top results → extract answer. Never stop after search alone.",
    "When the user asks for specific info (address, phone, date, amount), call read_email on 2-3 top results in parallel to find it.",
    "If the email body doesn't contain the answer but the email has attachments (has_attachments=true), call list_attachments → read_attachment to search inside PDFs, DOCXs, and other documents.",
    "Attachment chain: list_attachments → read_attachment (extracts text from PDFs/DOCX). Use get_attachment only when the user wants to download the file.",
    "If an email body shows [truncated], search with more specific terms or read thread-adjacent emails.",
]
